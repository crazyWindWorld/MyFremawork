syntax = "proto3";

package commonPB;
option go_package = "p3server/proto/commonPB";

enum ItemChangeSource{
  SourceUnknown = 0; // 其他类型
  SourceRegister = 1; // 玩家注册
  SourceReceiveEmail = 2; // 领取邮件奖励
  SourceBackpackSell = 3; // 背包售卖
  SourceBackpackUse = 4; // 背包使用
  SourceCheat = 5; // 使用作弊器操作
  SourceMainStageReward = 6; // 主章节阶段奖励
  SourceMainStageStart = 7; // 章节开始
  SourceMainStageEnd = 8; // 章节结束
  SourceStageStarReward = 9; // 星星奖励
  SourceSevenSignInReward = 10; // 七日签到奖励
  SourceCDKey = 11; // 兑换码奖励
  SourceChooseTreasure = 12; // 选择型宝箱


  SourceImageUnlock = 15; // 个人装饰解锁
  SourceImageSuitUpgrade = 16; // 套装升级
  SourceInitHead = 17; // 初始化头像

  SourceRelicLvChange = 101; // 神器升级消耗
  SourceRelicTransChange = 102; // 神器幻化消耗
  SourceRelicAwakeChange = 103; // 神器觉醒消耗

  SourceMountLvChange = 201; // 坐骑升级消耗
  SourceMountTransChange = 202; // 坐骑幻化消耗
  SourceMountAwakeChange = 203; // 坐骑觉醒消耗
  SourceMountUnlock = 204; // 坐骑解锁消耗

  SourceRandomPets = 300; // 抽宠物消耗道具
  SourceSwallowPetReturnItems = 301; // 吞噬退回升级道具
  SourceDecomposePets = 302; // 分解宠物
  SourceResetPetLevel = 303; // 重置宠物等级
  SourceUpgradedPet = 304; // 宠物升级消耗

  SourceEquipLvUpgrade = 501; // 装备升级
  SourceEquipTierUpgrade = 502; // 装备升阶
  SourceEquipRareUpgrade = 503; // 装备升品
  SourceEquipLvReset = 504; // 装备重置等级
  SourceEquipDecompose = 505; // 装备分解
  SourceRelicUnlock = 104; // 神器解锁消耗

  SourceTalentUpgrade = 601; // 天赋升级

  SourceShopActivityBox = 701;
  SourceShopCommonBox = 702;
  SourceShopAdvancedBox = 703;
  SourceShopChapterGift = 704;
  SourceShopChooseUpEquip = 705;

  SourceTravelFinish = 801; // 游历
  SourceTravelCost = 802;

  SourceDrawDailyTaskRewards = 903; // 领取日常任务奖励
  SourceDrawDailyTaskActiveRewards = 904; // 领取日常任务活跃度奖励
  SourceDrawWeeklyTaskRewards = 905; // 领取周常任务奖励
  SourceDrawWeeklyTaskActiveRewards = 906; // 领取周常任务活跃度奖励
  SourceDrawAchievementRewards = 907; // 领取成就奖励
  SourceSelectTravelAchievement = 908; // 选择随机旅行事件成就

  SourceOpenObjectBox = 1101; // 藏品宝箱
  SourceOpenPointBox = 1102; // 藏品宝箱
}

message Item{
  int64 id = 1;
  int64 cid = 2;
  int64 value = 3;
  int64 expire_at = 4;
}

message SmallItem{
  int64 cid = 1;
  int64 value = 2;
}

message ItemChange{
  Item item = 1;
  int64 change_value = 2;
}

message ItemChanges{
  repeated ItemChange items = 1;
  ItemChangeSource source = 2;
  // 增加道具时，只有被hook之后才会出现在这里，减少的都不会出现在这里, 目前只是给前端做表现用
  repeated SmallItem hook_items = 3;
}